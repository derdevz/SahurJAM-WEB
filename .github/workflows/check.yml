name: Check

on:
  push:
    branches:
      - dev
      - main
      - master
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax check
        run: npm run check

      - name: Build Pages artifact locally
        run: npm run build:pages
